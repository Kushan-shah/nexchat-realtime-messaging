databases:
  - name: nexchat-db
    plan: free
    databaseName: nexchat
    user: nexchat

services:
  - type: redis
    name: nexchat-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: nexchat-api
    plan: free
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexchat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nexchat-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FEATURE_AI_ENABLED
        value: "false"
      - key: FEATURE_RATE_LIMIT
        value: "true"
      - key: RATE_LIMIT_MSGS_PER_SEC
        value: "5"
      - key: RATE_LIMIT_BURST
        value: "20"
