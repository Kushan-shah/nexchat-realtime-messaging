name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    services:
      # Simulate Redis for rate-limiting & Idempotency tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Tests
      # We would run `npm test` here. Setting env vars for the test runner.
      env:
        NODE_ENV: test
        JWT_SECRET: testing-secret
        REDIS_URL: redis://localhost:6379
        FEATURE_AI_ENABLED: false
      # Just an echo placeholder if tests aren't fully robust yet
      run: npm run test
